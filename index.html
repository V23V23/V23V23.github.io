<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #f5f4f1;
    color: #3a3a3a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Navigation ────────────────────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 28px 48px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(to bottom, rgba(245,244,241,.95), rgba(245,244,241,0));
    transition: background .4s;
  }
  .nav.scrolled { background: rgba(245,244,241,.92); }
  .nav a {
    text-decoration: none; color: #4a4a4a;
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    transition: color .3s;
  }
  .nav a:hover { color: #111; }
  .nav .brand { font-weight: 500; letter-spacing: 5px; font-size: 13px; }
  .nav .links { display: flex; gap: 40px; }

  /* ── Hero ──────────────────────────────── */
  .hero-wrap {
    padding: 120px 48px 64px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-img {
    width: 100%;
    aspect-ratio: 3/2;
    object-fit: cover;
    cursor: pointer;
    display: block;
    background: #e8e6e1;
    box-shadow: 0 2px 20px rgba(0,0,0,.06);
    transition: box-shadow .5s, transform .1s;
  }
  .hero-img:hover { box-shadow: 0 4px 32px rgba(0,0,0,.1); }
  .hero-caption {
    margin-top: 20px;
    font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    color: #aaa;
    text-align: right;
  }

  /* ── Quote ─────────────────────────────── */
  .quote {
    text-align: center; padding: 80px 24px;
    max-width: 480px; margin: 0 auto;
  }
  .quote p {
    font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'Songti SC', serif;
    font-size: 18px; line-height: 2;
    color: #666;
    letter-spacing: 2px;
  }
  .quote .line {
    display: block; width: 32px; height: 1px;
    background: #ccc; margin: 28px auto;
  }

  /* ── Gallery Section ───────────────────── */
  .gallery-header {
    text-align: center; padding: 40px 24px 48px;
  }
  .gallery-header h2 {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: #999; font-weight: 400;
  }

  /* Masonry via CSS columns */
  .masonry {
    max-width: 1280px; margin: 0 auto;
    padding: 0 32px 80px;
    column-count: 3;
    column-gap: 24px;
  }
  .masonry .card {
    break-inside: avoid;
    margin-bottom: 24px;
    cursor: pointer;
    background: #e8e6e1;
    opacity: 0;
    transform: translateY(28px);
    transition: opacity .7s cubic-bezier(.25,.46,.45,.94),
                transform .7s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry .card.visible { opacity: 1; transform: translateY(0); }
  .masonry .card img {
    width: 100%; height: auto;
    display: block;
    transition: transform .5s cubic-bezier(.25,.46,.45,.94);
    box-shadow: 0 1px 8px rgba(0,0,0,.04);
  }
  .masonry .card:hover img { transform: scale(1.03); }

  /* ── About ─────────────────────────────── */
  .about {
    text-align: center; padding: 80px 24px 100px;
    max-width: 400px; margin: 0 auto;
  }
  .about .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #ccc; margin: 0 auto 36px;
  }
  .about p {
    font-size: 14px; color: #888; line-height: 2.2;
    letter-spacing: 1px;
  }

  /* ── Footer ────────────────────────────── */
  footer {
    text-align: center; padding: 40px 24px 48px;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: #bbb;
  }

  /* ── Lightbox ──────────────────────────── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(20,20,20,.95);
    display: none; align-items: center; justify-content: center;
    cursor: zoom-out;
    opacity: 0; transition: opacity .3s;
  }
  .lightbox.open { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 88vw; max-height: 88vh;
    object-fit: contain;
    cursor: default;
    animation: lbReveal .4s cubic-bezier(.25,.46,.45,.94);
  }
  @keyframes lbReveal {
    from { opacity: 0; transform: scale(.94); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lightbox .lb-close {
    position: absolute; top: 28px; right: 36px;
    color: rgba(255,255,255,.5); font-size: 28px; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    transition: color .3s; line-height: 1;
  }
  .lightbox .lb-close:hover { color: #fff; }

  .lightbox .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,.4); font-size: 32px; cursor: pointer;
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
    transition: color .3s;
  }
  .lightbox .lb-nav:hover { color: #fff; }
  .lightbox .lb-nav.prev { left: 20px; }
  .lightbox .lb-nav.next { right: 20px; }

  .lightbox .lb-count {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.3); font-size: 11px; letter-spacing: 4px;
  }

  /* ── Responsive ────────────────────────── */
  @media (max-width: 900px) {
    .masonry { column-count: 2; column-gap: 16px; padding: 0 20px 60px; }
    .masonry .card { margin-bottom: 16px; }
    .hero-wrap { padding: 100px 28px 40px; }
    .nav { padding: 20px 28px; }
    .nav .links { gap: 24px; }
  }

  @media (max-width: 560px) {
    .masonry { column-count: 2; column-gap: 10px; padding: 0 12px 48px; }
    .masonry .card { margin-bottom: 10px; }
    .hero-wrap { padding: 80px 16px 32px; }
    .nav { padding: 16px 16px; }
    .nav .links { gap: 18px; }
    .nav a { font-size: 11px; letter-spacing: 3px; }
    .nav .brand { letter-spacing: 3px; }
    .quote p { font-size: 15px; }
    .quote { padding: 48px 20px; }
    .about { padding: 48px 20px 72px; }
    .lightbox .lb-nav { font-size: 24px; width: 40px; height: 40px; }
    .lightbox .lb-nav.prev { left: 8px; }
    .lightbox .lb-nav.next { right: 8px; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<header class="nav" id="nav">
  <a href="#" class="brand">GALLERY</a>
  <div class="links">
    <a href="#home">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#about">About</a>
  </div>
</header>

<!-- Hero -->
<section id="home">
  <div class="hero-wrap">
    <img class="hero-img" id="heroImg" src="" alt="Cover photograph" loading="eager">
    <div class="hero-caption">Selected Work &mdash; 2026</div>
  </div>
</section>

<!-- Quote -->
<section class="quote">
  <p>光与影之间<br>万物静默如谜</p>
  <span class="line"></span>
</section>

<!-- Gallery -->
<section id="gallery">
  <div class="gallery-header">
    <h2>Gallery</h2>
  </div>
  <div class="masonry" id="masonry"></div>
</section>

<!-- About -->
<section id="about">
  <div class="about">
    <div class="dot"></div>
    <p>
      A photographer based in China.<br>
      Capturing moments of stillness<br>
      in a restless world.
    </p>
  </div>
</section>

<!-- Footer -->
<footer>&copy; 2026 Photography Portfolio</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lbClose">&times;</span>
  <button class="lb-nav prev" id="lbPrev">&#8249;</button>
  <img src="" alt="" id="lbImg">
  <button class="lb-nav next" id="lbNext">&#8250;</button>
  <span class="lb-count" id="lbCount"></span>
</div>

<script>
(function() {
  var images = [
    'images/DSC05905.JPG',
    'images/DSC05984.JPG',
    'images/DSC06211.JPG',
    'images/DSC06260.JPG',
    'images/DSC06315.JPG',
    'images/DSC06336.JPG',
    'images/DSC06670.JPG',
    'images/DSC06674.JPG'
  ];

  /* ═══ Hero Image ═══ */
  document.getElementById('heroImg').src = images[0];
  document.getElementById('heroImg').addEventListener('click', function() { openLightbox(0); });

  /* ═══ Nav Scroll Background ═══ */
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function() {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });

  /* ═══ Masonry + Scroll Reveal ═══ */
  var masonry = document.getElementById('masonry');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -20px 0px' });

  images.forEach(function(src, i) {
    var card = document.createElement('div');
    card.className = 'card';
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Photograph ' + (i + 1);
    img.setAttribute('loading', 'lazy');
    card.appendChild(img);
    card.addEventListener('click', function() { openLightbox(i); });
    observer.observe(card);
    masonry.appendChild(card);
  });

  /* ═══ Lightbox ═══ */
  var lbOpen = false, lbIdx = 0;
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCount = document.getElementById('lbCount');

  function openLightbox(idx) {
    lbIdx = idx; lbOpen = true;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }

  function closeLightbox() {
    lbOpen = false;
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  function updateLightbox() {
    lbImg.src = images[lbIdx];
    lbCount.textContent = (lbIdx + 1) + ' / ' + images.length;
  }

  function lbNext() { lbIdx = (lbIdx + 1) % images.length; updateLightbox(); }
  function lbPrev() { lbIdx = (lbIdx - 1 + images.length) % images.length; updateLightbox(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbNext').addEventListener('click', function(e) { e.stopPropagation(); lbNext(); });
  document.getElementById('lbPrev').addEventListener('click', function(e) { e.stopPropagation(); lbPrev(); });
  lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', function(e) {
    if (!lbOpen) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbPrev();
    if (e.key === 'ArrowRight') lbNext();
  });

  // Swipe for lightbox
  var touchX = 0;
  lb.addEventListener('touchstart', function(e) { touchX = e.touches[0].clientX; });
  lb.addEventListener('touchend', function(e) {
    var diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff > 0 ? lbNext() : lbPrev(); }
  });
})();
</script>

</body>
</html>
