<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #f7f6f3;
    color: #444;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Navigation ────────────────────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: center;
    padding: 32px 24px;
    transition: background .5s;
  }
  .nav.scrolled { background: rgba(247,246,243,.88); }
  .nav a {
    text-decoration: none; color: #888;
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    transition: color .4s;
  }
  .nav a:hover { color: #333; }
  .nav .sep { color: #ccc; margin: 0 24px; font-size: 11px; pointer-events: none; user-select: none; }

  /* ── Hero ──────────────────────────────── */
  .hero-wrap {
    padding: 100px 40px 32px;
    max-width: 1280px; margin: 0 auto;
    cursor: grab;
  }
  .hero-wrap.grabbing { cursor: grabbing; }
  .hero-stage {
    position: relative;
    aspect-ratio: 3/2;
    overflow: hidden;
    background: #e8e6e1;
    box-shadow: 0 1px 12px rgba(0,0,0,.045);
  }
  .hero-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }
  .hero-slide.active { opacity: 1; pointer-events: auto; }
  .hero-slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }

  .hero-foot {
    margin-top: 24px;
    display: flex; justify-content: flex-end;
  }
  .hero-dots { display: flex; gap: 10px; align-items: center; }
  .hero-dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: #d0cec8;
    cursor: pointer;
    transition: background .4s, transform .4s;
  }
  .hero-dots span.active { background: #888; transform: scale(1.5); }
  .hero-dots span:hover { background: #aaa; }

  /* ── Section Spacer ────────────────────── */
  .spacer { height: 96px; }

  /* ── Quote ─────────────────────────────── */
  .quote {
    text-align: center; padding: 0 24px;
    max-width: 520px; margin: 0 auto;
  }
  .quote p {
    font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'Songti SC', serif;
    font-size: 17px; line-height: 2.2;
    color: #777;
    letter-spacing: 2px;
  }
  .quote .line {
    display: block; width: 28px; height: 1px;
    background: #d0cec8; margin: 36px auto;
  }

  /* ── Gallery ───────────────────────────── */
  .gallery-section { padding-top: 48px; }

  .masonry {
    max-width: 1320px; margin: 0 auto;
    padding: 0 36px 96px;
    column-count: 3;
    column-gap: 28px;
  }
  .masonry .card {
    break-inside: avoid;
    margin-bottom: 28px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(32px);
    transition: opacity .9s cubic-bezier(.25,.46,.45,.94),
                transform .9s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry .card.visible { opacity: 1; transform: translateY(0); }
  .masonry .card img {
    width: 100%; height: auto;
    display: block;
    transition: transform .6s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry .card:hover img { transform: scale(1.025); }

  /* ── About ─────────────────────────────── */
  .about {
    text-align: center; padding: 0 24px 64px;
    max-width: 420px; margin: 0 auto;
  }
  .about .rule {
    width: 24px; height: 1px;
    background: #d0cec8; margin: 0 auto 40px;
  }
  .about p {
    font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'Songti SC', serif;
    font-size: 13px; color: #999; line-height: 2.4;
    letter-spacing: 1px;
  }
  .about .contact {
    margin-top: 36px;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: #bbb; font-style: normal; font-family: inherit;
  }

  /* ── Contact ───────────────────────────── */
  .contact-section {
    text-align: center; padding: 0 24px 96px;
  }
  .contact-section span {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #bbb;
  }
  .contact-section a {
    display: block; margin-top: 14px;
    font-size: 13px; color: #777; text-decoration: none;
    letter-spacing: 1px;
    transition: color .3s;
  }
  .contact-section a:hover { color: #333; }

  /* ── Footer ────────────────────────────── */
  footer {
    text-align: center; padding: 0 24px 48px;
    font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
    color: #ccc;
  }

  /* ── Lightbox ──────────────────────────── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(16,16,16,.94);
    display: none; align-items: center; justify-content: center;
    cursor: zoom-out;
    opacity: 0; transition: opacity .35s;
  }
  .lightbox.open { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 86vw; max-height: 86vh;
    object-fit: contain;
    cursor: default;
    animation: lbReveal .45s cubic-bezier(.25,.46,.45,.94);
  }
  @keyframes lbReveal {
    from { opacity: 0; transform: scale(.93); }
    to   { opacity: 1; transform: scale(1); }
  }
  .lightbox .lb-close {
    position: absolute; top: 28px; right: 36px;
    color: rgba(255,255,255,.4); font-size: 26px; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    transition: color .3s; line-height: 1;
  }
  .lightbox .lb-close:hover { color: #fff; }
  .lightbox .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,.3); font-size: 30px; cursor: pointer;
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
    transition: color .3s;
  }
  .lightbox .lb-nav:hover { color: #fff; }
  .lightbox .lb-nav.prev { left: 18px; }
  .lightbox .lb-nav.next { right: 18px; }
  .lightbox .lb-count {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.25); font-size: 11px; letter-spacing: 4px;
  }

  /* ── Responsive ────────────────────────── */
  @media (max-width: 900px) {
    .masonry { column-count: 2; column-gap: 18px; padding: 0 20px 64px; }
    .masonry .card { margin-bottom: 18px; }
    .hero-wrap { padding: 88px 24px 24px; }
    .nav { padding: 24px 16px; }
    .nav .sep { margin: 0 16px; }
    .spacer { height: 64px; }
  }

  @media (max-width: 560px) {
    .masonry { column-count: 2; column-gap: 10px; padding: 0 12px 48px; }
    .masonry .card { margin-bottom: 10px; }
    .hero-wrap { padding: 72px 12px 20px; }
    .nav { padding: 18px 12px; }
    .nav a { font-size: 10px; letter-spacing: 3px; }
    .nav .sep { margin: 0 12px; font-size: 10px; }
    .quote p { font-size: 14px; }
    .quote .line { margin: 24px auto; }
    .spacer { height: 48px; }
    .about { padding: 0 20px 80px; }
    .contact-section { padding: 0 20px 64px; }
    .about p { font-size: 12px; }
    .lightbox .lb-nav { font-size: 22px; width: 40px; height: 40px; }
    .lightbox .lb-nav.prev { left: 6px; }
    .lightbox .lb-nav.next { right: 6px; }
    .lightbox .lb-close { top: 16px; right: 20px; font-size: 22px; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<header class="nav" id="nav">
  <a href="#home">Home</a>
  <span class="sep">·</span>
  <a href="#gallery">Gallery</a>
  <span class="sep">·</span>
  <a href="#about">About</a>
</header>

<!-- Hero -->
<section id="home">
  <div class="hero-wrap" id="heroWrap">
    <div class="hero-stage" id="heroStage"></div>
    <div class="hero-foot">
      <div class="hero-dots" id="heroDots"></div>
    </div>
  </div>
</section>

<div class="spacer"></div>

<!-- Quote -->
<section class="quote">
  <p>光与影之间<br>寻一处安静</p>
  <span class="line"></span>
</section>

<div class="spacer"></div>

<!-- Gallery -->
<section id="gallery" class="gallery-section">
  <div class="masonry" id="masonry"></div>
</section>

<div class="spacer"></div>

<!-- About -->
<section id="about">
  <div class="about">
    <div class="rule"></div>
    <p>
      观看不同于看见。<br>
      摄影是在时间里耐心等待，<br>
      等一束光<br>
      照亮那些原本就在那里的事物。
    </p>
    <p class="contact">现居中国</p>
  </div>
</section>

<!-- Contact -->
<section class="contact-section">
  <span>Contact</span>
  <a href="mailto:3290281953@qq.com">3290281953@qq.com</a>
</section>

<!-- Footer -->
<footer>&copy; 2026</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lbClose">&times;</span>
  <button class="lb-nav prev" id="lbPrev">&#8249;</button>
  <img src="" alt="" id="lbImg">
  <button class="lb-nav next" id="lbNext">&#8250;</button>
  <span class="lb-count" id="lbCount"></span>
</div>

<script>
(function() {
  var images = [
    'images/DSC05905.JPG',
    'images/DSC05984.JPG',
    'images/DSC06211.JPG',
    'images/DSC06260.JPG',
    'images/DSC06315.JPG',
    'images/DSC06336.JPG',
    'images/DSC06670.JPG',
    'images/DSC06674.JPG'
  ];

  /* ═══ Hero Carousel ═══ */
  var heroCurrent = 0;
  var heroStage = document.getElementById('heroStage');
  var heroDots = document.getElementById('heroDots');
  var heroWrap = document.getElementById('heroWrap');
  var wheelTimer;

  images.forEach(function(src, i) {
    var slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Photograph ' + (i + 1);
    if (i === 0) img.setAttribute('fetchpriority', 'high');
    else img.setAttribute('loading', 'lazy');
    img.addEventListener('click', function() { openLightbox(i); });
    slide.appendChild(img);
    heroStage.appendChild(slide);

    var dot = document.createElement('span');
    if (i === 0) dot.className = 'active';
    dot.addEventListener('click', (function(idx) {
      return function() { goToHero(idx); };
    })(i));
    heroDots.appendChild(dot);
  });

  function goToHero(idx) {
    var slides = heroStage.querySelectorAll('.hero-slide');
    var dots = heroDots.querySelectorAll('span');
    slides.forEach(function(s, i) { s.classList.toggle('active', i === idx); });
    dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
    heroCurrent = idx;
    resetAutoPlay();
  }

  function heroNext() { goToHero((heroCurrent + 1) % images.length); }
  function heroPrev() { goToHero((heroCurrent - 1 + images.length) % images.length); }

  var autoTimer;
  function resetAutoPlay() {
    clearInterval(autoTimer);
    autoTimer = setInterval(heroNext, 5000);
  }
  resetAutoPlay();

  heroWrap.addEventListener('wheel', function(e) {
    e.preventDefault();
    if (wheelTimer) return;
    wheelTimer = setTimeout(function() { wheelTimer = null; }, 900);
    e.deltaY > 0 ? heroNext() : heroPrev();
  }, { passive: false });

  var hTX = 0, hTY = 0;
  heroWrap.addEventListener('touchstart', function(e) {
    hTX = e.touches[0].clientX; hTY = e.touches[0].clientY;
    heroWrap.classList.add('grabbing');
  });
  heroWrap.addEventListener('touchend', function(e) {
    heroWrap.classList.remove('grabbing');
    var dx = hTX - e.changedTouches[0].clientX;
    var dy = hTY - e.changedTouches[0].clientY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) { dx > 0 ? heroNext() : heroPrev(); }
    else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 40) { dy > 0 ? heroNext() : heroPrev(); }
  });

  document.addEventListener('keydown', function(e) {
    if (lbOpen) return;
    if (e.key === 'ArrowLeft') heroPrev();
    if (e.key === 'ArrowRight') heroNext();
  });

  /* ═══ Nav Scroll Background ═══ */
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function() {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });

  /* ═══ Masonry + Scroll Reveal ═══ */
  var masonry = document.getElementById('masonry');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -24px 0px' });

  images.forEach(function(src, i) {
    var card = document.createElement('div');
    card.className = 'card';
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Photograph ' + (i + 1);
    img.setAttribute('loading', 'lazy');
    card.appendChild(img);
    card.addEventListener('click', function() { openLightbox(i); });
    observer.observe(card);
    masonry.appendChild(card);
  });

  /* ═══ Lightbox ═══ */
  var lbOpen = false, lbIdx = 0;
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCount = document.getElementById('lbCount');

  function openLightbox(idx) {
    lbIdx = idx; lbOpen = true;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }

  function closeLightbox() {
    lbOpen = false;
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  function updateLightbox() {
    lbImg.src = images[lbIdx];
    lbCount.textContent = (lbIdx + 1) + ' / ' + images.length;
  }

  function lbNext() { lbIdx = (lbIdx + 1) % images.length; updateLightbox(); }
  function lbPrev() { lbIdx = (lbIdx - 1 + images.length) % images.length; updateLightbox(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbNext').addEventListener('click', function(e) { e.stopPropagation(); lbNext(); });
  document.getElementById('lbPrev').addEventListener('click', function(e) { e.stopPropagation(); lbPrev(); });
  lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', function(e) {
    if (!lbOpen) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbPrev();
    if (e.key === 'ArrowRight') lbNext();
  });

  var lbTX = 0;
  lb.addEventListener('touchstart', function(e) { lbTX = e.touches[0].clientX; });
  lb.addEventListener('touchend', function(e) {
    var diff = lbTX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff > 0 ? lbNext() : lbPrev(); }
  });
})();
</script>

</body>
</html>
