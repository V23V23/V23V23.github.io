<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: #0d0d0d;
    color: #b0b0b0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }

  /* ── Nav ─────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 40px;
    mix-blend-mode: difference;
  }
  nav .logo { font-size: 18px; font-weight: 600; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
  nav .links { display: flex; gap: 32px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }

  /* ── Hero Carousel ────────────────────── */
  .hero {
    position: relative; width: 100%; height: 100vh;
    overflow: hidden; background: #000;
  }
  .hero .slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 1.2s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; justify-content: center;
  }
  .hero .slide.active { opacity: 1; z-index: 1; }
  .hero .slide img {
    width: 100%; height: 100%;
    object-fit: contain;
    cursor: pointer;
    background: #000;
  }
  .hero .dots {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 10;
  }
  .hero .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.35);
    cursor: pointer; transition: background .3s;
  }
  .hero .dots span.active { background: #fff; }

  .hero .arrows {
    position: absolute; top: 50%; transform: translateY(-50%);
    display: flex; justify-content: space-between; width: 100%;
    padding: 0 20px; z-index: 10; pointer-events: none;
  }
  .hero .arrows button {
    background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.15);
    color: #fff; width: 48px; height: 48px; border-radius: 50%;
    cursor: pointer; font-size: 20px; pointer-events: auto;
    transition: background .3s, border-color .3s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .hero .arrows button:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.4); }

  /* ── Section Titles ───────────────────── */
  .section-title {
    text-align: center; padding: 100px 20px 48px;
    font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: #666;
  }

  /* ── Grid ─────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2px;
    padding: 0 2px 2px;
  }
  .grid .item {
    position: relative; overflow: hidden; aspect-ratio: 3/2;
    cursor: pointer; background: #111;
  }
  .grid .item img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }
  .grid .item:hover img { transform: scale(1.05); }
  .grid .item .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,.55), transparent 50%);
    opacity: 0; transition: opacity .35s;
    display: flex; align-items: flex-end; padding: 20px;
    font-size: 12px; letter-spacing: 2px; color: #fff;
  }
  .grid .item:hover .overlay { opacity: 1; }

  /* ── Lightbox ─────────────────────────── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.92);
    display: none; align-items: center; justify-content: center;
    cursor: zoom-out;
    backdrop-filter: blur(8px);
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 90vh;
    object-fit: contain;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    border-radius: 2px;
    cursor: default;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

  .lightbox .close {
    position: absolute; top: 24px; right: 32px;
    color: #fff; font-size: 32px; cursor: pointer;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .3s;
  }
  .lightbox .close:hover { background: rgba(255,255,255,.1); }

  .lightbox .nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #fff;
    font-size: 36px; cursor: pointer;
    width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .3s;
  }
  .lightbox .nav:hover { background: rgba(255,255,255,.1); }
  .lightbox .nav.prev { left: 20px; }
  .lightbox .nav.next { right: 20px; }

  .lightbox .counter {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.45); font-size: 12px; letter-spacing: 3px;
  }

  /* ── Footer ───────────────────────────── */
  footer {
    text-align: center; padding: 80px 20px 40px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: #444;
  }

  /* ── Responsive ───────────────────────── */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    nav .links { gap: 16px; font-size: 11px; }
    .hero { height: 60vh; }
    .hero .arrows { padding: 0 8px; }
    .hero .arrows button { width: 36px; height: 36px; font-size: 16px; }
    .hero .dots { bottom: 16px; gap: 8px; }
    .hero .dots span { width: 6px; height: 6px; }
    .grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .hero .slide img { object-fit: cover; }
    .lightbox .nav { font-size: 28px; width: 44px; height: 44px; }
    .lightbox .close { top: 12px; right: 16px; font-size: 28px; }
    .section-title { padding: 60px 20px 32px; }
  }

  @media (max-width: 480px) {
    .hero { height: 50vh; }
    .grid { grid-template-columns: 1fr 1fr; gap: 1px; }
    .hero .arrows button { width: 32px; height: 32px; font-size: 14px; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="#" class="logo">Gallery</a>
  <div class="links">
    <a href="#hero">Home</a>
    <a href="#grid">Work</a>
  </div>
</nav>

<!-- Hero Carousel -->
<section class="hero" id="hero">
  <div class="slides" id="slides"></div>
  <div class="arrows">
    <button id="prevBtn" aria-label="Previous">&#10094;</button>
    <button id="nextBtn" aria-label="Next">&#10095;</button>
  </div>
  <div class="dots" id="dots"></div>
</section>

<!-- Gallery Grid -->
<div class="section-title" id="grid">Gallery</div>
<div class="grid" id="gridContainer"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="close" id="lbClose">&times;</span>
  <button class="nav prev" id="lbPrev">&#10094;</button>
  <img src="" alt="" id="lbImg">
  <button class="nav next" id="lbNext">&#10095;</button>
  <div class="counter" id="lbCounter"></div>
</div>

<!-- Footer -->
<footer>&copy; 2026 Photography Portfolio</footer>

<script>
(function() {
  var images = [
    'images/DSC05905.JPG',
    'images/DSC05984.JPG',
    'images/DSC06211.JPG',
    'images/DSC06260.JPG',
    'images/DSC06315.JPG',
    'images/DSC06336.JPG',
    'images/DSC06670.JPG',
    'images/DSC06674.JPG'
  ];

  /* ═══ Carousel ═══ */
  var current = 0;
  var slidesEl = document.getElementById('slides');
  var dotsEl = document.getElementById('dots');
  var timer;

  images.forEach(function(src, i) {
    var div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Photo ' + (i + 1);
    img.setAttribute('loading', i === 0 ? 'eager' : 'lazy');
    img.addEventListener('click', function() { openLightbox(i); });
    div.appendChild(img);
    slidesEl.appendChild(div);

    var dot = document.createElement('span');
    if (i === 0) dot.className = 'active';
    dot.addEventListener('click', (function(idx) { return function() { goTo(idx); }; })(i));
    dotsEl.appendChild(dot);
  });

  // Reorder: put dots back at end
  document.querySelector('.hero').appendChild(dotsEl);

  function updateCarousel() {
    var slides = slidesEl.querySelectorAll('.slide');
    var dots = dotsEl.querySelectorAll('span');
    slides.forEach(function(s, i) { s.classList.toggle('active', i === current); });
    dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
  }

  function goTo(idx) {
    current = idx;
    updateCarousel();
    resetTimer();
  }

  function next() { goTo((current + 1) % images.length); }
  function prev() { goTo((current - 1 + images.length) % images.length); }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, 5000);
  }

  document.getElementById('prevBtn').addEventListener('click', function(e) { e.stopPropagation(); prev(); });
  document.getElementById('nextBtn').addEventListener('click', function(e) { e.stopPropagation(); next(); });
  resetTimer();

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });

  // Touch swipe for hero
  var touchStartX = 0;
  document.querySelector('.hero').addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
  document.querySelector('.hero').addEventListener('touchend', function(e) {
    var diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
  });

  /* ═══ Grid ═══ */
  var gridEl = document.getElementById('gridContainer');
  images.forEach(function(src, i) {
    var item = document.createElement('div');
    item.className = 'item';
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Photo ' + (i + 1);
    img.setAttribute('loading', 'lazy');
    var overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.textContent = 'View';
    item.appendChild(img);
    item.appendChild(overlay);
    item.addEventListener('click', function() { openLightbox(i); });
    gridEl.appendChild(item);
  });

  /* ═══ Lightbox ═══ */
  var lbOpen = false;
  var lbIdx = 0;
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCounter = document.getElementById('lbCounter');

  function openLightbox(idx) {
    lbIdx = idx;
    lbOpen = true;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }

  function closeLightbox() {
    lbOpen = false;
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  function updateLightbox() {
    lbImg.src = images[lbIdx];
    lbCounter.textContent = (lbIdx + 1) + ' / ' + images.length;
  }

  function lbNext() { lbIdx = (lbIdx + 1) % images.length; updateLightbox(); }
  function lbPrev() { lbIdx = (lbIdx - 1 + images.length) % images.length; updateLightbox(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbNext').addEventListener('click', function(e) { e.stopPropagation(); lbNext(); });
  document.getElementById('lbPrev').addEventListener('click', function(e) { e.stopPropagation(); lbPrev(); });
  lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', function(e) {
    if (!lbOpen) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbPrev();
    if (e.key === 'ArrowRight') lbNext();
  });

  // Touch swipe for lightbox
  lb.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
  lb.addEventListener('touchend', function(e) {
    var diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff > 0 ? lbNext() : lbPrev(); }
  });
})();
</script>

</body>
</html>
