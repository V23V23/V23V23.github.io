<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #efede8;
    color: #555;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Navigation ────────────────────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: center;
    padding: 32px 24px;
    transition: background .5s;
  }
  .nav.scrolled { background: rgba(239,237,232,.9); }
  .nav a {
    text-decoration: none; color: #999;
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    transition: color .4s;
  }
  .nav a:hover { color: #444; }
  .nav .sep { color: #ccc; margin: 0 22px; font-size: 10px; user-select: none; }

  /* ── Hero ──────────────────────────────── */
  .hero-wrap {
    padding: 100px 36px 28px;
    max-width: 1280px; margin: 0 auto;
    cursor: grab;
  }
  .hero-wrap.grabbing { cursor: grabbing; }
  .hero-stage {
    position: relative;
    aspect-ratio: 3/2;
    overflow: hidden;
    background: #e0ded8;
    box-shadow: 0 1px 10px rgba(0,0,0,.04);
  }
  .hero-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }
  .hero-slide.active { opacity: 1; pointer-events: auto; }
  .hero-slide img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    cursor: pointer;
  }
  .hero-slide .label {
    position: absolute; bottom: 24px; left: 28px;
    font-size: 13px; letter-spacing: 4px; color: #fff;
    text-shadow: 0 1px 8px rgba(0,0,0,.4);
  }
  .hero-foot {
    margin-top: 22px;
    display: flex; justify-content: flex-end;
  }
  .hero-dots { display: flex; gap: 10px; }
  .hero-dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: #d0cec8; cursor: pointer;
    transition: background .4s, transform .4s;
  }
  .hero-dots span.active { background: #888; transform: scale(1.5); }

  /* ── Section Spacing ───────────────────── */
  .gap { height: 80px; }

  /* ── Quote ─────────────────────────────── */
  .quote {
    text-align: center; padding: 0 24px;
    max-width: 520px; margin: 0 auto;
  }
  .quote p {
    font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', serif;
    font-size: 16px; line-height: 2.2; color: #888;
    letter-spacing: 2px;
  }
  .quote .line {
    display: block; width: 24px; height: 1px;
    background: #d0cec8; margin: 32px auto;
  }

  /* ── Category Section ──────────────────── */
  .category {
    max-width: 1320px; margin: 0 auto;
    padding: 0 36px 96px;
  }
  .cat-header {
    text-align: center; padding: 48px 0 40px;
  }
  .cat-header .cat-name {
    font-family: Georgia, 'Noto Serif SC', serif;
    font-size: 20px; color: #666; letter-spacing: 4px;
  }
  .cat-header .cat-en {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: #bbb; margin-top: 6px;
  }
  .cat-cover {
    margin-bottom: 32px;
    cursor: pointer;
  }
  .cat-cover img {
    width: 100%; height: auto; display: block;
    transition: transform .6s cubic-bezier(.25,.46,.45,.94);
  }
  .cat-cover:hover img { transform: scale(1.02); }

  .masonry {
    column-count: 3; column-gap: 24px;
  }
  .masonry .card {
    break-inside: avoid; margin-bottom: 24px;
    cursor: pointer;
    opacity: 0; transform: translateY(28px);
    transition: opacity .8s cubic-bezier(.25,.46,.45,.94),
                transform .8s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry .card.visible { opacity: 1; transform: translateY(0); }
  .masonry .card img {
    width: 100%; height: auto; display: block;
    transition: transform .5s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry .card:hover img { transform: scale(1.025); }

  .wm {
    position: relative; overflow: hidden;
  }
  .wm::after {
    content: '© V23V23';
    position: absolute; bottom: 8px; right: 12px;
    font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,.35);
    pointer-events: none; user-select: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.3);
  }

  /* ── About ─────────────────────────────── */
  .about {
    text-align: center; padding: 0 24px 64px;
    max-width: 420px; margin: 0 auto;
  }
  .about .rule {
    width: 20px; height: 1px;
    background: #d0cec8; margin: 0 auto 36px;
  }
  .about p {
    font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', serif;
    font-size: 13px; color: #999; line-height: 2.4;
    letter-spacing: 1px;
  }

  /* ── Contact ───────────────────────────── */
  .contact {
    text-align: center; padding: 0 24px 96px;
  }
  .contact .contact-title {
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: #bbb; margin-bottom: 24px;
  }
  .contact .links {
    display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
  }
  .contact a {
    text-decoration: none; color: #999;
    font-size: 12px; letter-spacing: 2px;
    transition: color .3s;
  }
  .contact a:hover { color: #444; }

  /* ── Footer ────────────────────────────── */
  footer {
    text-align: center; padding: 0 24px 44px;
    font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
    color: #ccc;
  }

  /* ── Lightbox ──────────────────────────── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(14,14,14,.95);
    display: none; align-items: center; justify-content: center;
    cursor: zoom-out;
    opacity: 0; transition: opacity .35s;
  }
  .lightbox.open { display: flex; opacity: 1; }
  .lightbox canvas {
    max-width: 86vw; max-height: 86vh;
    cursor: default;
    animation: lbIn .45s cubic-bezier(.25,.46,.45,.94);
  }
  @keyframes lbIn {
    from { opacity: 0; transform: scale(.93); }
    to   { opacity: 1; transform: scale(1); }
  }
  .lightbox .lb-close {
    position: absolute; top: 26px; right: 34px;
    color: rgba(255,255,255,.4); font-size: 26px; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    transition: color .3s;
  }
  .lightbox .lb-close:hover { color: #fff; }
  .lightbox .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,.3); font-size: 30px; cursor: pointer;
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
    transition: color .3s;
  }
  .lightbox .lb-nav:hover { color: #fff; }
  .lightbox .lb-nav.prev { left: 16px; }
  .lightbox .lb-nav.next { right: 16px; }
  .lightbox .lb-count {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.25); font-size: 11px; letter-spacing: 4px;
  }

  /* ── Responsive ────────────────────────── */
  @media (max-width: 900px) {
    .masonry { column-count: 2; column-gap: 16px; }
    .masonry .card { margin-bottom: 16px; }
    .category { padding: 0 20px 64px; }
    .hero-wrap { padding: 88px 24px 24px; }
    .nav { padding: 24px 16px; }
    .nav .sep { margin: 0 14px; }
    .gap { height: 48px; }
  }

  @media (max-width: 560px) {
    .masonry { column-count: 2; column-gap: 10px; }
    .masonry .card { margin-bottom: 10px; }
    .category { padding: 0 12px 48px; }
    .hero-wrap { padding: 72px 12px 18px; }
    .nav { padding: 18px 12px; }
    .nav a { font-size: 10px; letter-spacing: 3px; }
    .nav .sep { margin: 0 10px; }
    .hero-slide .label { font-size: 11px; bottom: 14px; left: 16px; }
    .cat-header .cat-name { font-size: 17px; }
    .quote p { font-size: 14px; }
    .gap { height: 36px; }
    .about { padding: 0 20px 48px; }
    .contact .links { gap: 20px; }
    .lightbox .lb-nav { font-size: 22px; width: 40px; height: 40px; }
    .lightbox .lb-nav.prev { left: 6px; }
    .lightbox .lb-nav.next { right: 6px; }
    .lightbox .lb-close { top: 14px; right: 18px; font-size: 22px; }
  }
</style>
</head>
<body>

<header class="nav" id="nav">
  <a href="#home">Home</a>
  <span class="sep">·</span>
  <a href="#gallery">Gallery</a>
  <span class="sep">·</span>
  <a href="#about">About</a>
  <span class="sep">·</span>
  <a href="#contact">Contact</a>
</header>

<section id="home">
  <div class="hero-wrap" id="heroWrap">
    <div class="hero-stage" id="heroStage"></div>
    <div class="hero-foot"><div class="hero-dots" id="heroDots"></div></div>
  </div>
</section>

<div class="gap"></div>

<section class="quote">
  <p>光与影之间<br>寻一处安静</p>
  <span class="line"></span>
</section>

<div class="gap"></div>

<section id="gallery">
  <div id="categories"></div>
</section>

<div class="gap"></div>

<section id="about">
  <div class="about">
    <div class="rule"></div>
    <p>
      观看不同于看见。<br>
      摄影是在时间里耐心等待，<br>
      等一束光<br>
      照亮那些原本就在那里的事物。
    </p>
  </div>
</section>

<section id="contact">
  <div class="contact">
    <div class="contact-title">Contact</div>
    <div class="links">
      <a href="mailto:3290281953@qq.com">Email</a>
      <a href="https://github.com/V23V23" target="_blank">GitHub</a>
      <a href="#" id="igLink">Instagram</a>
      <a href="#" id="wxLink">微信</a>
    </div>
  </div>
</section>

<footer>&copy; 2026</footer>

<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lbClose">&times;</span>
  <button class="lb-nav prev" id="lbPrev">&#8249;</button>
  <canvas id="lbCanvas"></canvas>
  <button class="lb-nav next" id="lbNext">&#8250;</button>
  <span class="lb-count" id="lbCount"></span>
</div>

<script>
(function() {

  /* ═══ Category Data ═══ */
  var categories = [
    { id: 'tibet',      name: '西藏', en: 'Tibet',      folder: 'images/Tibet/',      count: 7  },
    { id: 'changsha',   name: '长沙', en: 'Changsha',   folder: 'images/changsha/',   count: 8  },
    { id: 'chongqing',  name: '重庆', en: 'Chongqing',  folder: 'images/chongqing/',  count: 19 },
    { id: 'coast',      name: '海岸', en: 'Coast',      folder: 'images/coast/',      count: 5  },
    { id: 'dujiangyan', name: '都江堰', en: 'Dujiangyan',folder: 'images/dujiangyan/', count: 11 },
    { id: 'northwest',  name: '西北', en: 'Northwest',  folder: 'images/northwest/',  count: 3  }
  ];

  var prefixMap = { tibet:'A', changsha:'B', chongqing:'C', coast:'D', dujiangyan:'E', northwest:'F' };

  // Build flat image list and category image lists
  var allImages = [];
  var catImages = {};

  categories.forEach(function(cat) {
    var list = [];
    var p = prefixMap[cat.id];
    for (var i = 1; i <= cat.count; i++) {
      var path = cat.folder + p + i + '.jpg';
      list.push(path);
      allImages.push(path);
    }
    catImages[cat.id] = list;
  });

  /* ═══ Hero Carousel ═══ */
  var heroCurrent = 0;
  var heroStage = document.getElementById('heroStage');
  var heroDots = document.getElementById('heroDots');
  var heroWrap = document.getElementById('heroWrap');
  var wheelTimer, autoTimer;
  var heroSlides = [];

  categories.forEach(function(cat, i) {
    var cover = cat.folder + prefixMap[cat.id] + '1.jpg';
    heroSlides.push(cover);

    var slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    var img = document.createElement('img');
    img.src = cover;
    img.alt = cat.name;
    if (i === 0) img.setAttribute('fetchpriority', 'high');
    else img.setAttribute('loading', 'lazy');
    img.addEventListener('click', function() { openLightbox(allImages.indexOf(cover)); });
    slide.appendChild(img);

    var label = document.createElement('span');
    label.className = 'label';
    label.textContent = cat.name + ' · ' + cat.en;
    slide.appendChild(label);
    heroStage.appendChild(slide);

    var dot = document.createElement('span');
    if (i === 0) dot.className = 'active';
    dot.addEventListener('click', (function(idx) { return function() { goToHero(idx); }; })(i));
    heroDots.appendChild(dot);
  });

  function goToHero(idx) {
    var slides = heroStage.querySelectorAll('.hero-slide');
    var dots = heroDots.querySelectorAll('span');
    slides.forEach(function(s, i) { s.classList.toggle('active', i === idx); });
    dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
    heroCurrent = idx;
    resetAuto();
  }
  function heroNext() { goToHero((heroCurrent + 1) % heroSlides.length); }
  function heroPrev() { goToHero((heroCurrent - 1 + heroSlides.length) % heroSlides.length); }

  function resetAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(heroNext, 5000);
  }
  resetAuto();

  heroWrap.addEventListener('wheel', function(e) {
    e.preventDefault();
    if (wheelTimer) return;
    wheelTimer = setTimeout(function() { wheelTimer = null; }, 900);
    e.deltaY > 0 ? heroNext() : heroPrev();
  }, { passive: false });

  var hTX = 0, hTY = 0;
  heroWrap.addEventListener('touchstart', function(e) {
    hTX = e.touches[0].clientX; hTY = e.touches[0].clientY;
    heroWrap.classList.add('grabbing');
  });
  heroWrap.addEventListener('touchend', function(e) {
    heroWrap.classList.remove('grabbing');
    var dx = hTX - e.changedTouches[0].clientX;
    var dy = hTY - e.changedTouches[0].clientY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) { dx > 0 ? heroNext() : heroPrev(); }
    else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 40) { dy > 0 ? heroNext() : heroPrev(); }
  });

  /* ═══ Nav scroll ───────────────────────── */
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function() {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });

  /* ═══ Category Sections ────────────────── */
  var catContainer = document.getElementById('categories');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -24px 0px' });

  categories.forEach(function(cat, catIdx) {
    var section = document.createElement('div');
    section.className = 'category';
    section.id = cat.id;

    // Header
    var header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = '<div class="cat-name">' + cat.name + '</div><div class="cat-en">' + cat.en + '</div>';
    section.appendChild(header);

    // Cover
    var coverImg = new Image();
    coverImg.src = cat.folder + prefixMap[cat.id] + '1.jpg';
    coverImg.setAttribute('loading', 'lazy');
    coverImg.alt = cat.name;
    var coverWrap = document.createElement('div');
    coverWrap.className = 'cat-cover wm';
    coverWrap.appendChild(coverImg);
    (function(idx) {
      coverWrap.addEventListener('click', function() {
        openLightbox(allImages.indexOf(cat.folder + prefixMap[cat.id] + '1.jpg'));
      });
    })();
    section.appendChild(coverWrap);

    // Masonry (all photos including cover)
    var masonry = document.createElement('div');
    masonry.className = 'masonry';

    catImages[cat.id].forEach(function(src) {
      var card = document.createElement('div');
      card.className = 'card wm';
      var img = new Image();
      img.src = src;
      img.alt = cat.name;
      img.setAttribute('loading', 'lazy');
      card.appendChild(img);
      card.addEventListener('click', function() { openLightbox(allImages.indexOf(src)); });
      observer.observe(card);
      masonry.appendChild(card);
    });
    section.appendChild(masonry);
    catContainer.appendChild(section);
  });

  /* ═══ Keyboard (hero only when lb closed) ═══ */
  document.addEventListener('keydown', function(e) {
    if (lbOpen) return;
    if (e.key === 'ArrowLeft') heroPrev();
    if (e.key === 'ArrowRight') heroNext();
  });

  /* ═══ Lightbox ═══ */
  var lbOpen = false, lbIdx = 0;
  var lb = document.getElementById('lightbox');
  var lbCanvas = document.getElementById('lbCanvas');
  var lbCount = document.getElementById('lbCount');

  function openLightbox(idx) {
    lbIdx = idx; lbOpen = true;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }
  function closeLightbox() {
    lbOpen = false;
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }
  function updateLightbox() {
    var img = new Image();
    img.onload = function() {
      var maxW = window.innerWidth * 0.86;
      var maxH = window.innerHeight * 0.86;
      var scale = Math.min(maxW / img.width, maxH / img.height, 1);
      var w = img.width * scale, h = img.height * scale;
      lbCanvas.width = w; lbCanvas.height = h;
      lbCanvas.style.width = w + 'px';
      lbCanvas.style.height = h + 'px';
      var ctx = lbCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // Watermark
      var fontSize = Math.max(12, w * 0.025);
      ctx.font = fontSize + 'px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'right';
      ctx.fillText('© V23V23', w - fontSize * 0.8, h - fontSize * 0.6);
    };
    img.src = allImages[lbIdx];
    lbCount.textContent = (lbIdx + 1) + ' / ' + allImages.length;
  }
  function lbNext() { lbIdx = (lbIdx + 1) % allImages.length; updateLightbox(); }
  function lbPrev() { lbIdx = (lbIdx - 1 + allImages.length) % allImages.length; updateLightbox(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbNext').addEventListener('click', function(e) { e.stopPropagation(); lbNext(); });
  document.getElementById('lbPrev').addEventListener('click', function(e) { e.stopPropagation(); lbPrev(); });
  lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', function(e) {
    if (!lbOpen) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbPrev();
    if (e.key === 'ArrowRight') lbNext();
  });

  var lbTX = 0;
  lb.addEventListener('touchstart', function(e) { lbTX = e.touches[0].clientX; });
  lb.addEventListener('touchend', function(e) {
    var diff = lbTX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff > 0 ? lbNext() : lbPrev(); }
  });
})();
</script>

</body>
</html>
